<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨爾本國際學生交流團・行程手冊</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #EDF1EE;
    --bg-alt: #E3E9E4;
    --surface: #FFFFFF;
    --ink: #1D2A28;
    --ink-muted: #5C6C67;
    --line: #C9D2CC;
    --gold: #C08F35;
    --gold-soft: #F3E4C4;
    --teal: #2C6B5A;
    --teal-soft: #DCEAE4;
    --brick: #AE4A30;
    --brick-soft: #F4DED5;
    --font-display: 'Noto Serif TC', serif;
    --font-body: 'Noto Sans TC', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header.hero{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(192,143,53,0.18), transparent 55%),
      linear-gradient(180deg, #1D2A28 0%, #223834 100%);
    color: #F3F1EA;
    padding: 36px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  header.hero::after{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 46px);
    pointer-events:none;
  }
  .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-soft);
    opacity: 0.9;
    margin-bottom: 10px;
  }
  h1{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(26px, 6vw, 38px);
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .hero-sub{
    color: #C9D6CE;
    font-size: 14.5px;
    margin: 0 0 22px;
  }

  .status-board{
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--font-mono);
    backdrop-filter: blur(2px);
  }
  .status-dot{
    width: 10px; height:10px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 0 4px rgba(192,143,53,0.22);
    flex-shrink:0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 4px rgba(192,143,53,0.22); }
    50%{ box-shadow: 0 0 0 8px rgba(192,143,53,0.08); }
  }
  .status-text b{ color: #FBEFD2; font-weight:700; }
  .status-text{ font-size: 13.5px; color:#E7E2D2; }

  /* ---------- Route strip (signature nav) ---------- */
  nav.route-wrap{
    position: sticky; top:0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: 14px 12px 10px;
  }
  .route-scroll{
    display:flex;
    overflow-x:auto;
    scrollbar-width: none;
    padding: 6px 8px 14px;
    position: relative;
  }
  .route-scroll::-webkit-scrollbar{ display:none; }
  .route-line{
    position:absolute;
    left: 28px; right: 28px; top: 33px;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 16px);
    z-index: 0;
  }
  .stop{
    position: relative;
    z-index: 1;
    flex: 0 0 auto;
    width: 76px;
    display:flex; flex-direction:column; align-items:center;
    gap:8px;
    background:none; border:none; cursor:pointer;
    font-family: var(--font-body);
    padding: 4px 2px;
  }
  .stop-dot{
    width: 15px; height:15px; border-radius:50%;
    background: var(--surface);
    border: 3px solid var(--line);
    transition: all .2s ease;
  }
  .stop-day{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
  .stop-date{ font-size: 12.5px; font-weight:500; color: var(--ink); }
  .stop.active .stop-dot{ background: var(--teal); border-color: var(--teal); transform: scale(1.15); }
  .stop.active .stop-day, .stop.active .stop-date{ color: var(--teal); font-weight:700; }
  .stop.today .stop-dot{
    background: var(--gold); border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(192,143,53,0.25);
  }
  .stop.today::before{
    content: "現在";
    position:absolute; top:-14px;
    font-family: var(--font-mono);
    font-size: 9.5px; color: var(--gold);
    letter-spacing: 0.05em;
  }

  /* ---------- Main content ---------- */
  main{ max-width: 720px; margin: 0 auto; padding: 22px 16px 60px; }

  .day-card{
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(29,42,40,0.04);
  }
  .day-card-head{
    padding: 20px 22px 16px;
    border-bottom: 1px dashed var(--line);
  }
  .day-card-head .weekday-tag{
    display:inline-block;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--teal);
    background: var(--teal-soft);
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .day-card-head h2{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    margin: 0 0 4px;
  }
  .day-card-head .place{
    color: var(--ink-muted);
    font-size: 13.5px;
  }

  .timeline{ padding: 14px 22px 20px; position:relative; }
  .timeline::before{
    content:"";
    position:absolute;
    left: 39px;
    top: 20px; bottom: 28px;
    width: 2px;
    background: var(--line);
    z-index: 0;
  }
  .timeline-item{
    position:relative;
    z-index: 1;
    display:flex; gap: 14px;
    padding-bottom: 22px;
  }
  .timeline-item:last-child{ padding-bottom: 0; }
  .timeline-marker{
    flex: 0 0 34px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size: 15px;
  }
  .timeline-item.am .timeline-marker{ border-color: var(--gold); }
  .timeline-item.pm .timeline-marker{ border-color: var(--teal); }
  .timeline-item.eve .timeline-marker{ border-color: var(--brick); }
  .timeline-content{ flex:1; padding-top: 3px; }
  .timeline-label{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .timeline-item.am .timeline-label{ color: var(--gold); }
  .timeline-item.pm .timeline-label{ color: var(--teal); }
  .timeline-item.eve .timeline-label{ color: var(--brick); }
  .timeline-text{ font-size: 15px; color: var(--ink); }

  .banner{
    margin-top: 14px;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13.5px;
    display:flex; gap:10px; align-items:flex-start;
  }
  .banner.flight{ background: var(--brick-soft); color: #7A3220; }
  .banner.gold{ background: var(--gold-soft); color: #7A5A16; }

  /* ---------- Flight plan toggle ---------- */
  .plan-toggle{
    display:flex; gap:8px;
    padding: 0 22px 4px;
    flex-wrap: wrap;
  }
  .plan-pill{
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .plan-pill.active{
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
    font-weight: 700;
  }
  .plan-note{
    padding: 10px 22px 0;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ---------- Stay info ---------- */
  .stay-info{
    margin-top: 22px;
    background: var(--bg-alt);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 13.8px;
    color: var(--ink-muted);
  }
  .stay-info h3{
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--ink);
    margin: 0 0 10px;
  }
  .stay-info dl{ margin:0; display:grid; grid-template-columns: 76px 1fr; row-gap: 8px; column-gap: 10px; }
  .stay-info dt{ color: var(--ink); font-weight:500; }
  .stay-info dd{ margin:0; }

  footer{
    text-align:center;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-muted);
    padding: 30px 16px 40px;
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: reduce){
    .status-dot{ animation: none; }
  }

  /* ---------- Mobile readability tuning ---------- */
  @media (max-width: 480px){
    body{ font-size: 16px; }
    header.hero{ padding: 28px 16px 22px; }
    .hero-sub{ margin-bottom: 18px; }
    .status-board{ padding: 12px 14px; }
    .status-text{ font-size: 13px; line-height:1.5; }

    nav.route-wrap{ padding: 10px 8px 8px; }
    .stop{ width: 68px; min-height: 44px; }
    .stop-date{ font-size: 12px; }

    .day-card-head{ padding: 18px 18px 14px; }
    .day-card-head h2{ font-size: 20px; }
    .timeline{ padding: 12px 18px 16px; }
    .timeline::before{ left: 35px; }
    .timeline-marker{ flex-basis: 30px; width:30px; height:30px; font-size:14px; }
    .timeline-text{ font-size: 16px; }

    .plan-toggle{ padding: 0 18px 4px; }
    .plan-pill{ padding: 9px 14px; font-size: 12.5px; min-height: 40px; }
    .plan-note{ padding: 10px 18px 0; }

    .stay-info{ padding: 16px 16px; }
    .stay-info dl{ grid-template-columns: 64px 1fr; }
  }

  /* ---------- Spot accordion ---------- */
  .spot-list{ padding: 4px 22px 22px; display:flex; flex-direction:column; gap:10px; }
  .spot{
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
  }
  .spot-header{
    width:100%;
    display:flex; align-items:flex-start;
    justify-content:space-between;
    gap: 10px;
    padding: 13px 14px;
    background:none; border:none; cursor:pointer;
    font-family: var(--font-body);
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    text-align:left;
    min-height: 44px;
  }
  .spot-header-text{ display:flex; flex-direction:column; gap:3px; }
  .spot-header .chev{
    font-family: var(--font-mono);
    color: var(--ink-muted);
    transition: transform .2s ease;
    flex-shrink:0;
    padding-top: 2px;
  }
  .spot.open .spot-header .chev{ transform: rotate(180deg); }
  .spot-body{
    max-height:0;
    overflow:hidden;
    transition: max-height .25s ease;
    background: var(--surface);
  }
  .spot.open .spot-body{ /* max-height set inline by JS to fit content */ }
  .spot-body-inner{ padding: 4px 14px 16px; }
  .spot-block{ margin-bottom: 12px; }
  .spot-block:last-of-type{ margin-bottom: 14px; }
  .spot-block .spot-block-label{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .spot-block p{ margin:0; font-size: 13.8px; color: var(--ink); white-space: pre-line; }
  .spot-block p.en{ font-size: 12.5px; color: var(--ink-muted); font-style: italic; margin-top: 6px; padding-top: 8px; border-top: 1px dashed var(--line); }
  .spot-tagline{ display:block; font-size: 12px; font-weight:400; color: var(--ink-muted); margin-top: 2px; }
  .spot-tagline .en{ font-style: italic; }
  .extras{ margin-top: 22px; }
  .extras h3{ font-family: var(--font-display); font-size: 16px; margin: 0 0 4px; }
  .extras .sub{ font-size: 12.5px; color: var(--ink-muted); margin-bottom: 12px; }

  .tip-list{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
  .tip-list li{
    display:flex; gap:8px;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .tip-list li .tip-num{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--teal);
    flex-shrink:0;
    padding-top: 1px;
  }
  .tip-list li .tip-text{ font-size: 13.3px; color: var(--ink); }
  .tip-list li .tip-text .en{ display:block; font-size: 12px; color: var(--ink-muted); font-style: italic; margin-top: 2px; }
  .tip-list.facts li .tip-num{ color: var(--gold); }
  .tip-list.think li{ background: var(--teal-soft); }
  .tip-list.think li .tip-num{ color: var(--teal); }
  .spot-links{ display:flex; gap:8px; flex-wrap:wrap; }
  .spot-links a{
    font-family: var(--font-mono);
    font-size: 12px;
    text-decoration:none;
    color: var(--teal);
    background: var(--teal-soft);
    padding: 7px 11px;
    border-radius: 8px;
    min-height: 36px;
    display:inline-flex; align-items:center;
  }
  .spot-note{
    font-size: 11.5px;
    color: var(--ink-muted);
    padding: 0 22px 6px;
  }

  /* ---------- Prev/next day nav ---------- */
  .day-nav{
    display:flex; gap:10px;
    margin-top: 14px;
  }
  .day-nav button{
    flex:1;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    cursor:pointer;
    min-height: 48px;
  }
  .day-nav button:disabled{ opacity: 0.35; cursor:default; }
  .day-nav button.primary{ background: var(--teal); border-color: var(--teal); color:#fff; }

  /* ---------- Vocabulary + phrasebook ---------- */
  .term-list{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:6px; }
  .term-list li{
    display:grid; grid-template-columns: 1fr 1fr;
    gap: 2px 10px;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .term-list .term-en{ font-family: var(--font-mono); font-weight:600; font-size: 12.5px; color: var(--ink); }
  .term-list .term-zh{ font-size: 13px; color: var(--ink); text-align:right; }
  .term-list .term-note{ grid-column: 1 / -1; font-size: 11.3px; color: var(--ink-muted); margin-top:2px; }

  .phrase-list{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:7px; }
  .phrase-list li{
    background: var(--teal-soft);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13.3px;
    color: var(--ink);
    font-family: var(--font-mono);
  }

  /* ---------- Dark mode ---------- */
  body.dark-mode{
    --bg: #141F1B;
    --bg-alt: #1A2622;
    --surface: #1D2925;
    --ink: #E7EDE9;
    --ink-muted: #94A69F;
    --line: #30423C;
    --gold-soft: #3A2E17;
    --teal-soft: #1C2F28;
    --brick-soft: #3A241D;
  }
  body.dark-mode .day-card{ box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .theme-toggle{
    position: absolute; top: 18px; right: 18px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #F3F1EA;
    font-size: 16px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---------- Vocab search ---------- */
  .vocab-search{
    width:100%;
    box-sizing: border-box;
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    margin-bottom: 12px;
  }
  .vocab-empty{ font-size: 12.5px; color: var(--ink-muted); padding: 8px 2px; }

  /* ---------- Daily task menu ---------- */
  .task-menu{ margin: 0 22px 4px; }
  .task-menu-head{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .task-menu-sub{ font-size: 12px; color: var(--ink-muted); margin: -6px 0 8px; }
  .task-chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .task-chip{
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--ink);
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .task-chip .en{ font-size: 10.5px; color: var(--ink-muted); }
  .task-chip.selected{ background: var(--teal); border-color: var(--teal); color:#fff; }
  .task-chip.selected .en{ color: rgba(255,255,255,0.75); }

  /* ---------- Meal / expense log ---------- */
  .meal-log{ margin: 14px 22px 4px; background: var(--bg); border-radius: 10px; padding: 12px 14px; }
  .meal-log-head{
    display:flex; align-items:center; justify-content:space-between;
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--teal);
    margin-bottom: 10px;
  }
  .meal-total{ background: var(--teal-soft); color: var(--teal); padding: 2px 8px; border-radius: 999px; font-weight:700; }
  .meal-row{ display:flex; align-items:center; gap:10px; padding: 7px 0; border-bottom: 1px dashed var(--line); }
  .meal-row:last-child{ border-bottom:none; }
  .meal-row .meal-name{ flex: 0 0 64px; font-size: 13.5px; color: var(--ink); }
  .meal-row .meal-input-wrap{ flex:1; display:flex; align-items:center; gap:4px; }
  .meal-row .meal-input-wrap span{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .meal-row input[type="number"]{
    width: 72px;
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
  }
  .meal-row .photo-toggle{
    display:flex; align-items:center; gap:5px;
    font-size: 12px; color: var(--ink-muted);
    cursor:pointer;
    flex-shrink:0;
  }
  .meal-row input[type="checkbox"]{ width:16px; height:16px; accent-color: var(--teal); }

  /* ---------- Detailed schedule ---------- */
  .day-schedule{ margin: 0 22px 18px; }
  .day-schedule-head{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--brick);
    margin-bottom: 8px;
  }
  .schedule-row{ display:flex; gap:12px; padding: 8px 0; border-bottom: 1px solid #F0F2EF; }
  .schedule-row:last-child{ border-bottom:none; }
  .schedule-time{ flex: 0 0 92px; font-family: var(--font-mono); font-size: 12px; color: var(--brick); padding-top:1px; }
  .schedule-text{ flex:1; font-size: 14px; color: var(--ink); }
</style>
</head>
<body>

<header class="hero">
  <button class="theme-toggle" id="themeToggle" aria-label="切換深色模式">🌙</button>
  <div class="eyebrow">DA LI STUDY · MELBOURNE 2026</div>
  <h1>墨爾本國際學生交流團</h1>
  <p class="hero-sub">2026/07/13 — 2026/07/25 ・ 住宿地：Box Hill</p>
  <div class="status-board">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">載入中…</div>
  </div>
</header>

<nav class="route-wrap">
  <div class="route-scroll" id="routeScroll">
    <div class="route-line"></div>
    <!-- stops injected by JS -->
  </div>
</nav>

<main>
  <div class="day-card" id="dayCard"></div>

  <div class="stay-info">
    <h3>住宿資訊</h3>
    <dl>
      <dt>地址</dt><dd>11 Prospect Street, Box Hill, VIC 3128, Australia</dd>
      <dt>方式</dt><dd>飯店／公寓式住宿，由帶隊老師及學生共同入住管理，並非寄宿家庭（Homestay）</dd>
      <dt>房型</dt><dd>依實際訂房分配安排，由帶隊老師統一管理入住、房間分配及每日人員確認</dd>
    </dl>
  </div>

  <div class="extras" id="extrasSection"></div>
  <div class="extras" id="vocabSection"></div>
  <div class="extras" id="interviewSection"></div>
</main>

<footer>行程若有異動，以帶隊老師現場公告為準</footer>

<script>
const FLIGHT_PLANS = {

      zh:"維多利亞女王市場佔地超過七公頃，是南半球最大的露天市場。自1878年開業至今，每年吸引數百萬遊客造訪數百個攤位，販售新鮮蔬果、海鮮、肉品、服飾以及來自世界各地的美食。\n\n走在市場裡，就像走過一趟墨爾本的縮影——希臘橄欖、義大利起司、亞洲香料、澳洲蜂蜜，幾步路內就能全部找到。開業140多年後，它真正的魅力是網路購物永遠取代不了的：人與人之間的連結。",

function renderRefAccordion(containerId, headingHtml, items, bodyFn){
  const el = document.getElementById(containerId);
  el.innerHTML = `
    ${headingHtml}
    <div class="spot-list">
      ${items.map((item, i) => `
        <div class="spot" data-ref="${i}">
          <button class="spot-header">
            <span class="spot-header-text">${item.title}<span class="spot-tagline">${item.titleEn ? `<span class="en">${item.titleEn}</span>` : ''}</span></span>
            <span class="chev">⌄</span>
          </button>
          <div class="spot-body"><div class="spot-body-inner">${bodyFn(item)}</div></div>
        </div>
      `).join('')}
    </div>
  `;
  wireAccordion(el);
}

function renderVocab(query){
  const q = (query || '').trim().toLowerCase();
  const filtered = !q ? VOCAB_CATEGORIES : VOCAB_CATEGORIES
    .map(cat => ({ ...cat, terms: cat.terms.filter(t =>
      t.en.toLowerCase().includes(q) || t.zh.toLowerCase().includes(q) || t.note.toLowerCase().includes(q)
    ) }))
    .filter(cat => cat.terms.length > 0);

  const el = document.getElementById('vocabSection');
  el.innerHTML = `
    <h3>常用詞彙・Vocabulary</h3>
    <div class="sub">雙語詞彙補充表，點分類展開查看，或直接搜尋單字</div>
    <input type="text" class="vocab-search" id="vocabSearch" placeholder="搜尋單字・Search a word..." value="${query ? query.replace(/"/g,'&quot;') : ''}">
    ${filtered.length ? `<div class="spot-list">
      ${filtered.map((cat, i) => `
        <div class="spot${q ? ' open' : ''}" data-ref="${i}">
          <button class="spot-header">
            <span class="spot-header-text">${cat.title}<span class="spot-tagline"><span class="en">${cat.titleEn}</span></span></span>
            <span class="chev">⌄</span>
          </button>
          <div class="spot-body"><div class="spot-body-inner">
            <ul class="term-list">
              ${cat.terms.map(t => `<li><span class="term-en">${t.en}</span><span class="term-zh">${t.zh}</span><span class="term-note">${t.note}</span></li>`).join('')}
            </ul>
          </div></div>
        </div>
      `).join('')}
    </div>` : `<div class="vocab-empty">沒有符合的詞彙・No matching terms</div>`}
  `;
  wireAccordion(el);
  if (q) {
    el.querySelectorAll('.spot.open .spot-body').forEach(body => { body.style.maxHeight = body.scrollHeight + 'px'; });
  }
  const searchInput = document.getElementById('vocabSearch');
  searchInput.addEventListener('input', () => {
    const cursorPos = searchInput.selectionStart;
    const val = searchInput.value;
    renderVocab(val);
    const newInput = document.getElementById('vocabSearch');
    newInput.focus();
    newInput.setSelectionRange(cursorPos, cursorPos);
  });
}

const today = taipeiToday();
let currentIndex = DAYS.findIndex(d => d.date === today);
let statusMsg = "";

if (currentIndex === -1) {
  if (today < DAYS[0].date) {
    const diff = Math.ceil((new Date(DAYS[0].date) - new Date(today)) / 86400000);
    currentIndex = 0;
    statusMsg = `距離出發還有 <b>${diff}</b> 天`;
  } else {
    currentIndex = DAYS.length - 1;
    statusMsg = "行程已結束，感謝參加這趟交流之旅";
  }
} else {
  statusMsg = `今天是行程 <b>第 ${currentIndex + 1} 天</b>`;
}

let selectedIndex = currentIndex;

function mmdd(dateStr){
  const [,m,d] = dateStr.split("-");
  return `${parseInt(m)}/${parseInt(d)}`;
}

function renderRoute(){
  const wrap = document.getElementById('routeScroll');
  wrap.querySelectorAll('.stop').forEach(el => el.remove());
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'stop' + (i === selectedIndex ? ' active' : '') + (d.date === today ? ' today' : '');
    btn.innerHTML = `<span class="stop-dot"></span><span class="stop-day">DAY ${i+1}</span><span class="stop-date">${mmdd(d.date)}（${d.wd}）</span>`;
    btn.addEventListener('click', () => { selectedIndex = i; render(); });
    wrap.appendChild(btn);
  });
}

function planFields(d, index){
  // Returns {place, am, pm, eve} after applying the selected flight plan's overrides, if any.
  let { place, am, pm, eve } = d;
  if (index === 0) {
    eve = FLIGHT_PLANS[selectedPlan].day0eve;
  }
  if (index === 1) {
    const p1 = FLIGHT_PLANS[selectedPlan].day1;
    place = p1.place; am = p1.am; pm = p1.pm;
  }
  return { place, am, pm, eve };
}

function tipListHtml(items, cls){
  if (!items || !items.length) return '';
  return `<ol class="tip-list ${cls}">${items.map((t,i) => `
    <li><span class="tip-num">${i+1}</span><span class="tip-text">${t.zh}<span class="en">${t.en}</span></span></li>
  `).join('')}</ol>`;
}

function renderSpot(s, i){
  return `
    <div class="spot" data-spot="${i}">
      <button class="spot-header">
        <span class="spot-header-text">${s.name}<span class="spot-tagline">${s.tagZh}　<span class="en">${s.tagEn}</span></span></span>
        <span class="chev">⌄</span>
      </button>
      <div class="spot-body"><div class="spot-body-inner">
        <div class="spot-block"><div class="spot-block-label">📖 景點故事 · THE STORY</div><p>${s.zh}</p><p class="en">${s.en}</p></div>
        ${s.facts && s.facts.length ? `<div class="spot-block"><div class="spot-block-label">🔑 小知識 · QUICK FACTS</div>${tipListHtml(s.facts, 'facts')}</div>` : ''}
        ${s.photoTips && s.photoTips.length ? `<div class="spot-block"><div class="spot-block-label">📷 拍攝手法 · PHOTO TIPS</div>${tipListHtml(s.photoTips, 'photo')}</div>` : ''}
        ${s.think && s.think.length ? `<div class="spot-block"><div class="spot-block-label">💭 想一想 · THINK ABOUT IT</div>${tipListHtml(s.think, 'think')}</div>` : ''}
        <div class="spot-links">
          <a href="${mapsLink(s.name)}" target="_blank" rel="noopener">📍 Google 地圖</a>
          <a href="${transitLink(s.name)}" target="_blank" rel="noopener">🚌 大眾運輸路線</a>
        </div>
      </div></div>
    </div>
  `;
}

function wireAccordion(container){
  container.querySelectorAll('.spot').forEach(el => {
    el.querySelector('.spot-header').addEventListener('click', () => {
      const body = el.querySelector('.spot-body');
      const isOpen = el.classList.contains('open');
      if (isOpen) {
        body.style.maxHeight = '0px';
        el.classList.remove('open');
      } else {
        el.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
      }
    });
  });
}

function renderExtras(){
  const el = document.getElementById('extrasSection');
  if (!EXTRA_SPOTS.length) return;
  el.innerHTML = `
    <h3>延伸閱讀・墨爾本生活</h3>
    <div class="sub">跟行程沒有綁定特定一天，但很適合先讀一讀的墨爾本小知識</div>
    <div class="spot-list">
      ${EXTRA_SPOTS.map((s, i) => renderSpot(s, i)).join('')}
    </div>
  `;
  wireAccordion(el);
}
function renderCard(){
  const d = DAYS[selectedIndex];
  const f = planFields(d, selectedIndex);
  const card = document.getElementById('dayCard');
  const toggleHtml = d.planToggle ? `
    <div class="plan-toggle">
      ${[1,2].map(p => `<button class="plan-pill${selectedPlan === p ? ' active' : ''}" data-plan="${p}">${FLIGHT_PLANS[p].label}</button>`).join('')}
    </div>
    <div class="plan-note">機票尚未確定，以下先依你選擇的方案顯示，兩案回程航班相同（CI58）</div>
  ` : '';
  const spots = SPOTS[selectedIndex] || [];
  const spotsHtml = spots.length ? `
    <div class="spot-note">點景點名稱展開中英雙語景點故事、小知識、拍攝手法、想一想跟快速連結</div>
    <div class="spot-list">
      ${spots.map((s, i) => renderSpot(s, i)).join('')}
    </div>
  ` : '';

  const scheduleHtml = d.schedule ? `
    <div class="day-schedule">
      <div class="day-schedule-head">🗓️ 詳細時間表 · DETAILED SCHEDULE</div>
      ${d.schedule.map(row => `
        <div class="schedule-row">
          <div class="schedule-time">${row.time}</div>
          <div class="schedule-text">${row.zh}<br><span style="color:var(--ink-muted); font-size:12.5px;">${row.en}</span></div>
        </div>
      `).join('')}
    </div>
  ` : '';

  const taskOptions = getTaskOptions(selectedIndex);
  const selected = getSelectedTasks(selectedIndex);
  const taskMenuHtml = `
    <div class="task-menu">
      <div class="task-menu-head">🎬 出門前先想想 · BEFORE YOU HEAD OUT</div>
      <div class="task-menu-sub">今天可以挑一個（或多個）拍下來記錄</div>
      <div class="task-chips">
        ${taskOptions.map((t, i) => `
          <button class="task-chip${selected.has(i) ? ' selected' : ''}" data-task-idx="${i}">${t.icon} ${t.zh}<span class="en">${t.en}</span></button>
        `).join('')}
      </div>
    </div>
  `;

  const meals = getMealState(selectedIndex);
  const total = MEALS.reduce((sum, m) => sum + (parseFloat(meals[m.key].amount) || 0), 0);
  const mealLogHtml = `
    <div class="meal-log">
      <div class="meal-log-head"><span>🍽️ 三餐紀錄與花費 · MEALS & EXPENSES</span><span class="meal-total">AUD $${total.toFixed(0)}</span></div>
      ${MEALS.map(m => `
        <div class="meal-row" data-meal="${m.key}">
          <div class="meal-name">${m.zh}</div>
          <div class="meal-input-wrap"><span>AUD $</span><input type="number" min="0" step="0.5" placeholder="0" value="${meals[m.key].amount}"></div>
          <label class="photo-toggle"><input type="checkbox" ${meals[m.key].photo ? 'checked' : ''}>📷 拍照了</label>
        </div>
      `).join('')}
    </div>
  `;

  card.innerHTML = `
    <div class="day-card-head">
      <span class="weekday-tag">DAY ${selectedIndex + 1} / ${DAYS.length}</span>
      <h2>${mmdd(d.date)}（${d.wd}）</h2>
      <div class="place">${f.place}</div>
    </div>
    ${toggleHtml}
    <div class="timeline">
      <div class="timeline-item am">
        <div class="timeline-marker">☀️</div>
        <div class="timeline-content">
          <div class="timeline-label">上午 · MORNING</div>
          <div class="timeline-text">${f.am}</div>
        </div>
      </div>
      <div class="timeline-item pm">
        <div class="timeline-marker">🌇</div>
        <div class="timeline-content">
          <div class="timeline-label">下午 · AFTERNOON</div>
          <div class="timeline-text">${f.pm}</div>
        </div>
      </div>
      <div class="timeline-item eve">
        <div class="timeline-marker">🌙</div>
        <div class="timeline-content">
          <div class="timeline-label">晚上 · EVENING</div>
          <div class="timeline-text">${f.eve}</div>
        </div>
      </div>
    </div>
    ${scheduleHtml}
    ${d.flight ? `<div style="padding:0 22px 20px;"><div class="banner flight">✈️ 今天有搭機行程，請提前確認證件與行李</div></div>` : ``}
    ${taskMenuHtml}
    ${mealLogHtml}
    ${spotsHtml}
    <div style="padding: 4px 22px 22px;">
      <div class="day-nav">
        <button id="prevDay" ${selectedIndex === 0 ? 'disabled' : ''}>← 前一天</button>
        <button id="nextDay" class="primary" ${selectedIndex === DAYS.length - 1 ? 'disabled' : ''}>後一天 →</button>
      </div>
    </div>
  `;
  card.querySelectorAll('.plan-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPlan = parseInt(btn.dataset.plan);
      renderCard();
    });
  });
  card.querySelectorAll('.task-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const i = parseInt(chip.dataset.taskIdx);
      const sel = getSelectedTasks(selectedIndex);
      if (sel.has(i)) sel.delete(i); else sel.add(i);
      chip.classList.toggle('selected');
    });
  });
  card.querySelectorAll('.meal-row').forEach(row => {
    const key = row.dataset.meal;
    const input = row.querySelector('input[type="number"]');
    const checkbox = row.querySelector('input[type="checkbox"]');
    input.addEventListener('input', () => {
      meals[key].amount = input.value;
      const newTotal = MEALS.reduce((sum, m) => sum + (parseFloat(meals[m.key].amount) || 0), 0);
      const badge = card.querySelector('.meal-total');
      if (badge) badge.textContent = `AUD $${newTotal.toFixed(0)}`;
    });
    checkbox.addEventListener('change', () => { meals[key].photo = checkbox.checked; });
  });
  card.querySelectorAll('.spot').forEach(el => el.classList.remove('open'));
  wireAccordion(card);
  const prevBtn = card.querySelector('#prevDay');
  const nextBtn = card.querySelector('#nextDay');
  if (prevBtn) prevBtn.addEventListener('click', () => { if (selectedIndex > 0){ selectedIndex--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
  if (nextBtn) nextBtn.addEventListener('click', () => { if (selectedIndex < DAYS.length - 1){ selectedIndex++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
}

function render(){
  document.getElementById('statusText').innerHTML = statusMsg;
  renderRoute();
  renderCard();
  const activeStop = document.querySelector('.stop.active');
  if (activeStop) activeStop.scrollIntoView({ inline: 'center', block: 'nearest' });
}

function initTheme(){
  const btn = document.getElementById('themeToggle');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (prefersDark) {
    document.body.classList.add('dark-mode');
    btn.textContent = '☀️';
  }
  btn.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark-mode');
    btn.textContent = isDark ? '☀️' : '🌙';
  });
}

render();
renderExtras();
renderVocab();
